<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Anúncio - Pede Aí</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="anuncios.css">
    <style>
        .form-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .form-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-link { text-decoration: none; color: var(--primary); font-weight: 600; }
        form { background: white; padding: 24px; border-radius: var(--radius-main); box-shadow: var(--card-shadow); }
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px;
            font-family: inherit; font-size: 15px; transition: border-color 0.2s; box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        .upload-box {
            border: 2px dashed #cbd5e0; border-radius: 12px; padding: 30px;
            text-align: center; cursor: pointer; color: #718096; margin-bottom: 10px;
        }
        .btn-submit {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px;
            cursor: pointer; margin-top: 10px; transition: opacity 0.2s;
        }
        .btn-submit:disabled { opacity: 0.6; }
        #statusPlano {
            background: #ebf8ff; border: 1px solid #bee3f8;
            color: #2b6cb0; padding: 12px; border-radius: 10px;
            font-size: 14px; font-weight: 600; margin-bottom: 20px; text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <header class="form-header">
            <a href="anuncios.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar</a>
            <h2 style="margin:0">Novo Anúncio</h2>
        </header>

        <div id="statusPlano"></div>

        <form id="formAnuncio">
            <div class="field-group">
                <label>Categoria</label>
                <select id="categoria" required>
                    <option value="" disabled selected>Selecione uma categoria</option>
                    <option value="Casas">🏠 Casas</option>
                    <option value="Veículos">🚗 Veículos</option>
                    <option value="Eletrônicos">📱 Eletrônicos</option>
                    <option value="Brechó">🧥 Brechó</option>
                </select>
            </div>

            <div class="field-group">
                <label id="labelTitulo">Título do Anúncio</label>
                <input type="text" id="titulo" required placeholder="Ex: iPhone 13 semi-novo">
            </div>

            <div id="sessaoPrecoWhats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="field-group" id="grupoPreco">
                    <label>Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" required placeholder="0,00">
                </div>
                <div class="field-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="whatsapp" required placeholder="(00) 00000-0000">
                </div>
            </div>

            <div class="field-group">
                <label id="labelFoto">Foto do Produto (Obrigatória)</label>
                <div class="upload-box" onclick="document.getElementById('fotoFile').click()">
                    <input type="file" id="fotoFile" accept="image/*" style="display: none;">
                    <div id="previewPlaceholder">
                        <i class="fas fa-camera fa-2x"></i>
                        <p>Toque para adicionar foto</p>
                    </div>
                    <img id="imgPreview" src="" style="display: none; width: 100%; height: 200px; object-fit: cover; border-radius: 8px;">
                </div>
            </div>

            <div class="field-group">
                <label>Descrição Detalhada</label>
                <textarea id="descricao" rows="4" required placeholder="Conte mais detalhes..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="btnEnviar">Publicar Anúncio</button>
        </form>
    </div>
    <script src="criaranuncios.js"></script>
</body>
</html>
